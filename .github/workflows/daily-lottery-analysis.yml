name: Daily Lottery Analysis

on:
  schedule:
    #- cron: '0 3 * * *'   # 每天 UTC 3:00（北京时间 11:00）
    - cron: '0 0 * * *'    # 每天 UTC 0:00（北京时间 8:00）
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib openpyxl requests

      - name: Run lottery analysis
        run: |
          echo "开始执行彩票分析脚本..."
          echo "触发时间（UTC）: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "触发时间（北京时间）: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          python deepseek_cp2025.py

      - name: Commit and push report
        run: |
          if [ ! -f "deepseek_cp_report.html" ]; then
            echo "❌ 报告文件不存在"
            exit 1
          fi
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add deepseek_cp_report.html
          if ! git diff --staged --quiet; then
            BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
            git commit -m "🔮 自动更新彩票分析报告 ${BEIJING_TIME}"
            git pull origin main --rebase
            git push origin main
            echo "✅ 报告提交完成"
          else
            echo "没有变化可提交"
          fi

      - name: Upload report as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lottery-report-${{ github.run_number }}   # 使用 run_number 作为唯一标识
          path: deepseek_cp_report.html
          retention-days: 7

      - name: Show summary
        run: |
          echo "========================================"
          echo "🎰 彩票分析任务完成"
          echo "📅 UTC时间: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "📅 北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 触发方式: ${{ github.event_name }}"
          if [ -f "deepseek_cp_report.html" ]; then
            file_size=$(wc -c < deepseek_cp_report.html)
            echo "✅ 报告文件: deepseek_cp_report.html"
            echo "📊 文件大小: ${file_size} 字节"
            echo "🌐 访问地址: https://github.com/cloudplains/jnsj/blob/main/deepseek_cp_report.html"
            echo "📥 Artifact: lottery-report-${{ github.run_number }}"
          else
            echo "❌ 报告生成失败"
          fi
          echo "========================================"