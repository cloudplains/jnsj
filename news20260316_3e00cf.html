            flex-wrap: wrap;

        .stats span {

        .stats .dot-g {

            height: 12px;
            background: #2b8c5e;

            background: #d99f2b;
        }
        .stats .dot-r {
            background: #c23b2b;

        }

        .continent:hover {
            box-shadow: 0 18px 30px -8px rgba(17, 45, 78, 0.15);
        }

        .continent-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;

            align-items: center;
            gap: 10px;

            font-size: 1rem;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            color: #1d3b5c;
        }

        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.4rem;
        }

        /* 国家卡片 */
        .country-card {
            background: #fafcff;
            border-radius: 20px;
            padding: 1.2rem 1.2rem 1rem;
            border: 1px solid #dde5ed;
            transition: background 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
        }

        .country-card:hover {
            background: #ffffff;
            border-color: #bcd0e5;
        }

        .country-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 1.2rem;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 0.5rem;
        }

        .country-name .country-num {
            background: #e1eaf1;
            width: 26px;
            height: 26px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e405e;
        }

        /* 网站列表 */
        .site-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .site-item {
            font-size: 0.92rem;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            color: #1e2f44;
            word-break: break-word;
        }

        .site-item .bullet {
            font-size: 1.2rem;
            line-height: 1.2;
            flex-shrink: 0;
            width: 1.6em;
            text-align: left;
        }

        .site-content {
            flex: 1;
        }

        .site-content a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #b9d1f0;
        }

        .site-content a:hover {
            color: #0b2f7a;
            border-bottom: 1px solid #2563eb;
        }

        /* 直接条目 (无国家分类，如联合国、其他网站) */
        .direct-sites {

            background: #f4f9ff;
            border-radius: 18px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #cbddec;
        }

        .direct-sites h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #1e3a5f;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .direct-sites ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
        }

        .direct-sites li {
            flex: 0 1 auto;
            min-width: 240px;
        }

        /* 加载/解析状态 */
        .loading {
            text-align: center;
            padding: 5rem;
            color: #62748b;
            font-size: 1.2rem;
        }

            font-size: 0.85rem;
            color: #6f7e93;
            text-align: center;
            border-top: 1px solid #d7e0e9;

        }
        .dot-y {
            color: #c48b1b;
        }
        .dot-r {
            color: #c23b2b;
        }

</footer>

<script>
(function() {
    // 获取原始文本
    const raw = document.getElementById('rawSource').textContent;

    // 工具：HTML转义
    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    // 将文本中的URL转换为<a>标签 (前提是文本已经被转义)
    function linkify(escapedText) {
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return escapedText.replace(urlPattern, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
    }

    // 处理单行内容：转义 + 链接化
    function processLineContent(line) {
        const escaped = escapeHtml(line);
        return linkify(escaped);
    }

    // 解析主逻辑
    function parseSource(text) {
        const lines = text.split(/\r?\n/);
        const continents = [];
        let currentContinent = null;
        let currentCountry = null;

        for (let line of lines) {
            const trimmed = line.trim();
            if (trimmed === '') continue;

            // 大洲标题 (以🧰开头)
            if (trimmed.startsWith('🧰')) {
                if (currentContinent) {
                    continents.push(currentContinent);
                }
                const continentName = trimmed.replace(/^🧰\s*/, '').trim() || '其他';
                currentContinent = {
                    name: continentName,
                    countries: [],
                    directItems: []
                };
                currentCountry = null;
                continue;
            }

            if (!currentContinent) continue;

            // 国家标题: 以数字开头，例如 "1 中国" 或 "2 日本"
            const countryMatch = trimmed.match(/^(\d+)\s+(.+)/);
            if (countryMatch) {
                const countryNum = countryMatch[1];
                const countryRawName = countryMatch[2].trim();
                currentCountry = {
                    number: countryNum,
                    displayName: countryRawName,
                    items: []
                };
                currentContinent.countries.push(currentCountry);
                continue;
            }

            // 网站条目: 以 🟢 🟡 🔴 开头
            if (trimmed.startsWith('🟢') || trimmed.startsWith('🟡') || trimmed.startsWith('🔴')) {
                const colorSymbol = trimmed.slice(0, 2);
                const restLine = trimmed.slice(2).trim();

                const item = {
                    color: colorSymbol,
                    raw: restLine,
                    processed: processLineContent(restLine)
                };

                if (currentCountry) {
                    currentCountry.items.push(item);
                } else {
                    currentContinent.directItems.push(item);
                }
                continue;
            }

            // 其他行忽略（可能是一些注释，但保留大洲下的直接链接已经涵盖）
        }

        if (currentContinent) continents.push(currentContinent);
        return continents;
    }

    // 渲染大洲数据到DOM
    function render(continents) {
        const output = document.getElementById('output');
        output.className = '';
        output.innerHTML = '';

        for (const cont of continents) {
            const contDiv = document.createElement('div');
            contDiv.className = 'continent';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'continent-header';
            headerDiv.innerHTML = `<h2>${escapeHtml(cont.name)} <span>${cont.countries.length}国 / 直链${cont.directItems.length}</span></h2>`;
            contDiv.appendChild(headerDiv);

            if (cont.directItems.length > 0) {
                const directDiv = document.createElement('div');
                directDiv.className = 'direct-sites';
                directDiv.innerHTML = '<h3>📌 直属站点</h3>';
                const ul = document.createElement('ul');
                for (const item of cont.directItems) {
                    const li = document.createElement('li');
                    li.className = 'site-item';
                    li.innerHTML = `<span class="bullet">${item.color}</span><span class="site-content">${item.processed}</span>`;
                    ul.appendChild(li);
                }
                directDiv.appendChild(ul);
                contDiv.appendChild(directDiv);
            }

            if (cont.countries.length > 0) {
                const grid = document.createElement('div');
                grid.className = 'country-grid';

                for (const country of cont.countries) {
                    const card = document.createElement('div');
                    card.className = 'country-card';

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'country-name';
                    nameDiv.innerHTML = `<span class="country-num">${escapeHtml(country.number)}</span> ${escapeHtml(country.displayName)}`;
                    card.appendChild(nameDiv);

                    if (country.items.length > 0) {
                        const ul = document.createElement('ul');
                        ul.className = 'site-list';
                        for (const item of country.items) {
                            const li = document.createElement('li');
                            li.className = 'site-item';
                            li.innerHTML = `<span class="bullet">${item.color}</span><span class="site-content">${item.processed}</span>`;
                            ul.appendChild(li);
                        }
                        card.appendChild(ul);
                    }

                    grid.appendChild(card);
                }

                contDiv.appendChild(grid);
            }

            output.appendChild(contDiv);
        }
    }

    try {
        const continents = parseSource(raw);
        render(continents);
    } catch (e) {
        document.getElementById('output').innerHTML = `<div style="color:#b33; padding:3rem;">解析出错：${e.message}。请稍后重试。</div>`;
        console.error(e);
    }
})();
</script>
